<!DOCTYPE html>
<html>

<head>
    <title>Workouts and Recipes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>My Workouts &amp; Recipes</h1>

    <div class="container">
        <div class="workout-group">
            <ul class="workout-card">
                <li>Overhead Arm Push</li>
                <li>Curls</li>
                <li>Bench Press</li>
            </ul>

            <form class="workout-card">
                <label for="workout-name">Workout to add:</label>
                <input type="text" id="workout-name">
                <button type="submit">Add Workout</button>
            </form>
        </div>

        <div class="recipe-group">
            <ul class="recipe-card">
                <li>Chicken Alfredo</li>
                <li>Chicken Parm</li>
                <li>Chicken Linguini</li>
            </ul>

            <form class="recipe-card">
                <label for="recipe-name">Recipe to add:</label>
                <input type="text" id="recipe-name">
                <button type="submit">Add Recipe</button>
            </form>
        </div>
    </div>

</body>

</html>
